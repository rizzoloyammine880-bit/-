<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>防伪查询</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-client-api="/.netlify/functions/query">
    <main class="page-shell">
      <section class="brand-visual" aria-label="品牌展示">
        <img src="/assets/brand-banner.png" alt="品牌宣传图" />
      </section>

      <section class="query-panel">
        <div class="halo" aria-hidden="true"></div>

        <header class="query-title">
          <h1>防伪查询</h1>
          <p>SECURITY ENQUIRIES</p>
        </header>

        <article class="result-card">
          <p class="greeting">您好，您所查询的防伪码是</p>
          <div class="code-strip" id="securityCode">正在查询...</div>
          <p class="auth-text">是授权商品防伪系统登记的有效编码</p>
          <p class="thanks">感谢您的查询！</p>

          <div class="scan-status">
            <p id="currentCount">当前是第 -- 次查询</p>
            <p id="firstTime">首次查询时间是 --</p>
          </div>
        </article>

        <button class="record-button" id="recordButton" type="button">查询记录</button>

        <section class="record-drawer" id="recordDrawer" hidden>
          <div class="record-row">
            <span>防伪编码</span>
            <strong id="recordCode">--</strong>
          </div>
          <div class="record-row">
            <span>扫码微信</span>
            <strong id="recordVisitor">--</strong>
          </div>
          <div class="record-row">
            <span>当前查询次数</span>
            <strong id="recordCurrentCount">--</strong>
          </div>
          <div class="record-row">
            <span>本微信查询</span>
            <strong id="recordVisitorCount">--</strong>
          </div>
          <div class="record-row">
            <span>首次查询时间</span>
            <strong id="recordFirstTime">--</strong>
          </div>
          <div class="record-row">
            <span>最近查询时间</span>
            <strong id="recordLastTime">--</strong>
          </div>
        </section>

        <footer class="support">
          <p>技术支持：中企防伪</p>
          <p>Copyright 2010-2026 All Rights Reserved</p>
        </footer>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
